<header class="header">
  <div class="container d-flex align-items-center justify-content-between">
    <img src="images/logo.png" alt="GAPSI Logo" class="header__logo" />

    <div class="header__profile">
      <img
        src="images/profile-img.png"
        alt="Avatar de usuario"
        class="header__avatar"
        (click)="toggleProfileCard()"
      />

      @if (showProfileCard()) {
        <div class="header__card">
          <div class="header__card-banner"></div>
          <div class="header__card-body">
            <img
              src="images/profile-img.png"
              alt="Avatar de usuario"
              class="header__card-img"
            />
            <p class="header__card-name">{{ welcome() }}</p>
            <span class="header__card-badge">{{ version() }}</span>
          </div>
        </div>
      }
    </div>
  </div>
</header>
